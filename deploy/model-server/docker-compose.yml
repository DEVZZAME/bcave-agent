name: bcave-model-server

# GPU VRAM 프로파일 선택:
#   VRAM_PROFILE=48gb (기본)  FP8, max-len 131072
#   VRAM_PROFILE=24gb          AWQ 4bit, max-len 65536
#   VRAM_PROFILE=80gb          BF16 원본, max-len 262144
#
# 사용 예:
#   VRAM_PROFILE=48gb docker compose up -d
#   VRAM_PROFILE=24gb docker compose up -d

services:
  model-server:
    image: vllm/vllm-openai:latest
    container_name: bcave-model-server
    restart: unless-stopped

    # GPU 전체 할당
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "${MODEL_SERVER_PORT:-8000}:8000"

    # HuggingFace 캐시를 호스트에 마운트(재다운로드 방지)
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface

    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}

    # 프로파일별 서빙 명령
    command: >
      sh -c "
        PROFILE=$${VRAM_PROFILE:-48gb}
        if [ \"$$PROFILE\" = \"24gb\" ]; then
          MODEL=Qwen/Qwen3-Coder-30B-A3B-Instruct-AWQ
          MAX_LEN=65536
          DTYPE=half
        elif [ \"$$PROFILE\" = \"80gb\" ]; then
          MODEL=Qwen/Qwen3-Coder-30B-A3B-Instruct
          MAX_LEN=262144
          DTYPE=bfloat16
        else
          MODEL=Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
          MAX_LEN=131072
          DTYPE=auto
        fi
        echo \"[model-server] profile=$$PROFILE model=$$MODEL max-len=$$MAX_LEN\"
        exec python -m vllm.entrypoints.openai.api_server \
          --model $$MODEL \
          --dtype $$DTYPE \
          --max-model-len $$MAX_LEN \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --served-model-name qwen3-coder \
          --api-key $${MODEL_SERVER_KEY:-change-me} \
          --host 0.0.0.0 \
          --port 8000
      "

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # 모델 로딩 대기

    # 컨테이너 로그 보존
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
