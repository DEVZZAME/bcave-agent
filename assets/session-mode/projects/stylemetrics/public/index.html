<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleMetrics — 로그인</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <aside class="auth-hero">
      <div class="brand">
        <span class="brand-mark">◆</span> StyleMetrics
      </div>
      <h1>우리 컬렉션의 진짜 성과를 확인하세요.</h1>
      <p>매출, 마진, 판매율, 반품을 카테고리·채널·시즌별로 한눈에. 패션 머천다이징 팀을 위한 상품 성과 대시보드입니다.</p>
      <ul class="hero-list">
        <li>실시간 상품 성과</li>
        <li>카테고리 &amp; 채널 분석</li>
        <li>반품률 &amp; 마진 인사이트</li>
      </ul>
    </aside>

    <main class="auth-card">
      <div class="tabs">
        <button class="tab active" data-tab="login">로그인</button>
        <button class="tab" data-tab="signup">회원가입</button>
      </div>

      <!-- Login -->
      <form id="login-form" class="auth-form">
        <h2>다시 오신 것을 환영합니다</h2>
        <label>이메일
          <input type="email" name="email" autocomplete="email" placeholder="you@brand.com" value="demo@stylemetrics.app" required />
        </label>
        <label>비밀번호
          <input type="password" name="password" autocomplete="current-password" placeholder="••••••••" value="demo1234" required />
        </label>
        <div class="form-msg" id="login-msg"></div>
        <button type="submit" class="btn-primary">로그인</button>
        <p class="demo-hint">데모 계정 → <strong>demo@stylemetrics.app</strong> / <strong>demo1234</strong></p>
      </form>

      <!-- Signup -->
      <form id="signup-form" class="auth-form hidden">
        <h2>계정 만들기</h2>
        <label>이름
          <input type="text" name="name" autocomplete="name" placeholder="홍길동" required />
        </label>
        <label>이메일
          <input type="email" name="email" autocomplete="email" placeholder="you@brand.com" required />
        </label>
        <label>비밀번호
          <input type="password" name="password" autocomplete="new-password" placeholder="6자 이상 입력" required />
        </label>
        <div class="form-msg" id="signup-msg"></div>
        <button type="submit" class="btn-primary">계정 만들기</button>
      </form>
    </main>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
